<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hogwarts</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Hogwarts</h1>
            <img src="images/Hogwarts-Crest.png" alt="Crest">
        </div>
        <!-- Burger Menu Button -->
        <div class="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About us</a></li>
                    <li><a href="spells.html">Spells</a></li>
                    <li><a href="houses.html">Houses</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <img src="images/hogwarts-express.jpg" class="bg-image">

    <main>
        <div class="contact-container">
            <div class="intro-text">
                <h2>Owl Post</h2>
                <p>Send a message to the Headmaster or visit us at the Highlands.</p>
            </div>

            <div class="contact-wrapper">
                <div class="map-container">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2473.320232220324!2d-0.4206800238607473!3d51.69058469730526!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x48764103e950758d%3A0x2b152593ceb59b52!2sHogwarts%20Castle!5e0!3m2!1ska!2sge!4v1768676629077!5m2!1ska!2sge"
                        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>

                </div>

                <div class="contact-details">
                    <form class="owl-form">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Owl Address (Email)" required>
                        <textarea placeholder="Your Message..."></textarea>
                        <button type="submit" class="glass-button">Send Owl</button>
                    </form>

                    <div class="social-magic">
                        <h3>Follow the Magic</h3>
                        <div class="social-icons">
                            <span>FB</span> | <span>IG</span> | <span>TW</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- </main> -->
        <footer>
            <div class="footer-content">
                <p>&copy; 2026 Hogwarts School of Witchcraft & Wizardry</p>
            </div>
        </footer>

        <script src="app.js"></script>

</body>

</html>
